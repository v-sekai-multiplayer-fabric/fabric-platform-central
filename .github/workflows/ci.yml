name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: fabric-platform-central-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: mix compile + format + test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test

  build:
    name: Burrito Linux exe
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: goto-bus-stop/setup-zig@v2.2.1
        with:
          version: "0.15.2"

      - uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Install deps
        run: mix deps.get

      - name: Build Burrito release (Linux x86_64)
        env:
          MIX_ENV: prod
        run: mix release fabric_platform_central

      - name: Show burrito_out layout
        run: find burrito_out -type f || true

      - name: Verify Linux exe exists
        run: |
          if [ ! -f "burrito_out/fabric_platform_central_linux" ]; then
            echo "ERROR: burrito_out/fabric_platform_central_linux not found"
            exit 1
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: fabric-platform-central-linux-exe
          path: burrito_out/fabric_platform_central_linux
          if-no-files-found: error
