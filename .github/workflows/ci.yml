name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: fabric-platform-central-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: mix compile + format + test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test

  build:
    name: Burrito Linux exe
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: goto-bus-stop/setup-zig@v2.2.1
        with:
          version: "0.15.2"

      - uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Install deps
        run: mix deps.get

      - name: Build Burrito release (Linux x86_64)
        env:
          MIX_ENV: prod
        run: mix release fabric_platform_central

      - name: Verify Linux exe exists
        run: |
          exe=burrito_out/fabric_platform_central_linux
          if [ ! -f "$exe" ]; then
            echo "ERROR: $exe not found"
            exit 1
          fi
          size=$(stat -c%s "$exe")
          sha=$(sha256sum "$exe" | awk '{print $1}')
          echo "### Linux exe built" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| file | \`fabric_platform_central_linux\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| size | $size bytes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| sha256 | \`$sha\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Attach Linux exe to GitHub Release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" burrito_out/fabric_platform_central_linux --clobber
