name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease=""
          if [[ "$tag" == *"-dev"* || "$tag" == *"-beta"* || "$tag" == *"-rc"* ]]; then
            prerelease="--prerelease"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            $prerelease \
            || true
